<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header class="header">

        <a href="index.html" id="home" class="headerbtn">Home</a>
        <a href="https://github.com/melissagarridos?tab=repositories" id="projects" class="headerbtn">Projects</a>
        <a href="about.html" id="about" class="headerbtn">About</a>
        <a href="pets.html" id="pets"  class="headerbtn">Pets</a>
        <a href="contact.html" id="get-in-touch" class="headerbtn" class="active">Contact</a>
        <a href="https://www.linkedin.com/in/melissavgs/" id="linkedin" class="headerbtn">LinkedIn</a>
        
    </header>


    <section class="center-title">
        <span>Contact<span class="highlight">.</span>
    </section>

    <section id="form">

        <form class="contact-form" id="contactForm" novalidate>
            <div class="field">
                <label class="textarea" for="name">Name <span class="req">*</span></label>
                <input type="text" id="name" name="name" placeholder="Jane Doe" required>
            </div>
            <div class="field">
                    <label class="textarea" for="email">Email <span class="req">*</span></label>
                    <input type="email" id="email" name="email" placeholder="jane@email.com" required>
            </div>
             <div class="field">
                <label class="textarea" for="phone">Phone number</label>
                <input type="tel" id="phone" name="phone" placeholder="+57 300 000 0000">
            </div>
            <div class="field">
                <label class="textarea" for="message">What do you want to talk about?</label>
                <textarea id="message" name="message" placeholder="Briefly describe your project or question..."></textarea>
            </div>
            <div class="submit-row">
                <button id="submitbtn" type="submit">Send request →</button>
            </div>
            <div class="success-msg" id="successMsg">
                ✓ &nbsp; Request sent! I'll get back to you within 24 hours.
            </div>

        </form>
    </section>

<script src="index.js"></script>  
</body>
</html>
